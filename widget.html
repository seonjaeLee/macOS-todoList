<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Widget</title>
  <link rel="stylesheet" href="widget.css" />
</head>
<body>
  <div class="widget" id="widget">

    <!-- 타이틀바 (드래그 + 더블클릭 접기) -->
    <div class="titlebar" id="titlebar">
      <button class="btn-collapse" id="btn-collapse">▾</button>
      <span class="title" id="title" spellcheck="false">메모</span>
      <div class="titlebar-actions" id="titlebar-actions">
        <div class="titlebar-toolbar" id="titlebar-toolbar">
          <button
            class="btn-float"
            id="btn-float"
            type="button"
            hidden
            data-tooltip="항상 위에 띄우기"
            aria-label="항상 위에 띄우기"
          >
            <svg viewBox="0 0 24 24" class="svg-float" aria-hidden="true">
              <path d="M12 2a8 8 0 0 1 8 8c0 3.2-2.5 5.6-4.5 7h-7C6.5 15.6 4 13.2 4 10a8 8 0 0 1 8-8z" class="balloon-body" />
              <path d="M12 2c2 2.5 2 11 0 15" />
              <path d="M12 2c-2 2.5-2 11 0 15" />
              <path d="M9 17l0.5 3" />
              <path d="M15 17l-0.5 3" />
              <rect x="9.5" y="20" width="5" height="3" rx="0.5" class="balloon-basket" />
            </svg>
          </button>
          <button
            class="btn-add-widget"
            id="btn-add-widget"
            type="button"
            data-tooltip="메모추가"
            aria-label="메모추가"
          >＋</button>
          <button
            class="btn-palette"
            id="btn-palette"
            type="button"
            data-tooltip="메모지 색상 변경"
            aria-label="메모지 색상 변경"
          ><span class="palette-swatch" aria-hidden="true"></span></button>
        </div>
        <div class="titlebar-more" id="titlebar-more">
          <button
            class="btn-more"
            id="btn-more"
            type="button"
            data-tooltip="더보기"
            aria-label="더보기"
            aria-haspopup="true"
            aria-expanded="false"
          ><svg class="icon-more" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><circle cx="7" cy="3" r="1.35" fill="currentColor"/><circle cx="7" cy="7" r="1.35" fill="currentColor"/><circle cx="7" cy="11" r="1.35" fill="currentColor"/></svg></button>
          <div class="more-menu" id="more-menu" role="menu" hidden>
            <button type="button" class="more-menu-item" id="more-add" role="menuitem">
              <span class="more-menu-label">메모 추가</span>
            </button>
            <button type="button" class="more-menu-item" id="more-color" role="menuitem">
              <span class="more-menu-label">메모지 색상 변경</span>
            </button>
            <button type="button" class="more-menu-item" id="more-float" role="menuitem">
              <span class="more-menu-label">항상 위에 띄우기</span>
              <span class="more-menu-check" id="more-float-check" aria-hidden="true">✓</span>
            </button>
            <button type="button" class="more-menu-item more-menu-item--danger" id="more-delete" role="menuitem">
              <span class="more-menu-label">메모 삭제</span>
            </button>
          </div>
        </div>
        <input type="color" id="color-input" class="color-input" />
        <button class="btn-close" id="btn-close" aria-label="닫기">✕</button>
      </div>
    </div>

    <!-- 본문 (접기 시 숨김) -->
    <div class="body" id="body">

      <!-- 개요 -->
      <textarea
        id="memo-desc"
        class="memo-desc"
        placeholder="개요를 입력하세요..."
        spellcheck="false"
      ></textarea>

      <!-- 할일 입력 -->
      <div class="input-row">
        <input
          type="text"
          id="new-todo"
          class="new-todo"
          placeholder="할 일 추가..."
          maxlength="80"
        />
        <button class="btn-add-todo" id="btn-add-todo">＋</button>
      </div>

      <!-- 할일 목록 -->
      <ul class="todo-list" id="todo-list"></ul>

      <!-- 완료 항목 삭제 -->
      <div class="footer">
        <button class="btn-clear" id="btn-clear">완료 항목 삭제</button>
      </div>

      <!-- 초안 노트 전용 본문: 자유 텍스트 -->
      <textarea
        id="draft-text"
        class="draft-text"
        placeholder="자유롭게 적어보세요..."
        spellcheck="false"
      ></textarea>

    </div>
  </div>

  <!-- 리사이즈 핸들 -->
  <div class="resize-handle resize-e"  data-edge="right"></div>
  <div class="resize-handle resize-w"  data-edge="left"></div>
  <div class="resize-handle resize-s"  data-edge="bottom"></div>
  <div class="resize-handle resize-se" data-edge="bottom-right"></div>
  <div class="resize-handle resize-sw" data-edge="bottom-left"></div>

  <!-- 본문 빈 바닥 우클릭 메뉴 (.widget overflow 밖) -->
  <div class="ctx-menu" id="ctx-menu" role="menu" hidden>
    <button type="button" class="more-menu-item" data-action="add" role="menuitem">
      <span class="more-menu-label">메모 추가</span>
    </button>
    <button type="button" class="more-menu-item" data-action="color" role="menuitem">
      <span class="more-menu-label">메모지 색상 변경</span>
    </button>
    <button type="button" class="more-menu-item" data-action="float" role="menuitem">
      <span class="more-menu-label">항상 위에 띄우기</span>
      <span class="more-menu-check ctx-float-check" aria-hidden="true">✓</span>
    </button>
    <button type="button" class="more-menu-item more-menu-item--danger" data-action="delete" role="menuitem">
      <span class="more-menu-label">메모 삭제</span>
    </button>
  </div>

  <script src="widget.js"></script>
</body>
</html>
