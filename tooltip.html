<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: visible;
    }
    #tip-svg {
      display: block;
      overflow: visible;
    }
    #tip-text {
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <svg id="tip-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="tip-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
        <feDropShadow dx="0" dy="0.5" stdDeviation="0.4" flood-color="#000000" flood-opacity="0.18" />
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.26" />
      </filter>
    </defs>
    <path id="tip-shape" fill="#323232" filter="url(#tip-shadow)" />
    <text id="tip-text" fill="#ffffff" font-size="11" font-weight="400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Malgun Gothic', 'Segoe UI', sans-serif" />
  </svg>
</body>
</html>
